  <script>
 
    
    // Generate Text for Jutta Bauer
    class JBauerAnimation {
      static COLOR_BASE = 155;
      static COLOR_RANGE = 100;
      static DELAY = 600;

      constructor() {
        this.wordsElement = null;
        this.imageElement = null;
        this.wordArray = null;
        this.animationLength = null;
        // This ensures that this inside animateWords and animateBackground always refers to the instance of JBauerAnimation, even when these methods are passed as callbacks.
        this.animateWords = this.animateWords.bind(this);
        this.animateBackground = this.animateBackground.bind(this);
      }

      initialize(parameterClass, imageClass, str) {
        this.wordsElement = document.querySelector(parameterClass);
        this.imageElement = document.querySelector(imageClass);
        this.wordArray = str.split(' ');
        this.animationLength = Math.round((100 / this.wordArray.length) * 100 + Number.EPSILON) / 100;

        this.animateElement(this.wordsElement, this.animateWords);
        this.animateElement(this.imageElement, this.animateBackground);
      }

      generateColor() {
        return `rgb(${Math.floor(Math.random() * JBauerAnimation.COLOR_RANGE + JBauerAnimation.COLOR_BASE)},0,0)`;
      }

      animateElement(element, action) {
        let imagePos = 0;

        const requests = this.wordArray.reduce((promiseChain, item, index) => {
          return promiseChain.then(() => new Promise((resolve) => {
            setTimeout(() => {
              action(element, item, imagePos);
              imagePos += this.animationLength;
              resolve();
            }, JBauerAnimation.DELAY * index);
          }));
        }, Promise.resolve());

        requests.then(() => console.log('done'));
      }

      animateWords(element, word, imagePos) {
        const span = document.createElement('span');
        span.style.color = this.generateColor();
        span.textContent = `${word} `;
        element.appendChild(span);
      }

      animateBackground(element, word, imagePos) {
        const posCss = `0% ${imagePos}%`;
        element.style.backgroundPosition = posCss;
        element.style.backgroundColor = this.generateColor();
      }
    }
   // ARRAYS FOR JUTTA BAUER
   const hello = '"Ich bin Jutta Bauer und werde meine Arbeit als Illustratorin und Autorin vorstellen. Ich kann etwas zu meiner Entwicklung sagen und was mir wichtig ist, sowie einige Bücher zeigen und erzählen, wie die Geschichten und die Bilder entstanden sind. Mit was ich mich im Moment beschäftige könnte vielleicht auch interessant sein. Am Ende würde ich gern Raum lassen für Gespräch und Fragen."'
    const englishWords = 'talks about her books and her project „corona diary“';
    const germanWords = 'spricht über ihre Bücher und ihr Projekt „corona diary“';
    
    const generateTwoLangHover = (englishWords, germanWords) => {
      const englishWordsArray = englishWords.split(' ');
      const germanWordsArray = germanWords.split(' ');

      return englishWordsArray.map((word, i) => `
        <span>
          <span>${word}</span>
          <span>${germanWordsArray[i]}</span>
        </span>
      `).join('');
    };

    document.addEventListener('DOMContentLoaded', function() {
      const twoLangHover = document.querySelector('.twoLangHover');
      twoLangHover.innerHTML = generateTwoLangHover(englishWords, germanWords);
      const animation = new JBauerAnimation();
      animation.initialize('.JBauer', '.JBauerImage', hello);
    });

  </script>
