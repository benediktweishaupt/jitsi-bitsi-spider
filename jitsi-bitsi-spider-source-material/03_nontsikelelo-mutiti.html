  <script>
    // ARRAYS FOR Nontsikelelo Mutiti
    const classNames = ['singleLetter--white', 'singleLetter--black']
    const colors = ['black', 'white'];
    const borderRadius = ['25vw', '25vw', '25vw', '0', '0', '0', '0', '0', '0'];

    // Classes for Nontsikelelo Mutiti
    document.addEventListener('DOMContentLoaded', function() {

      // let prefix = getCssValuePrefix();
      
      setInterval( function() {
        // changeFontSize('.singleLetter', 10);
        changeFlex('.singleLetter', 200);
        changeFlex('.letterRow', 100);
        changeClass('.singleLetter', classNames);
        cssGradients('.singleLetter', colors);
        cssGradients('.letterRow', colors);
      }, 1000);
      
      setInterval( function() {
        changeFontSize('.singleLetter', 1, 40);
        changeBorderRadius('.singleLetter', borderRadius);
      }, 8000);
      
      changeFlex('.singleLetter', 400);
      changeFlex('.letterRow', 100);
      changeFontSize('.singleLetter', 10);
      changeClass('.singleLetter', classNames);
      changeBorderRadius('.singleLetter', borderRadius);
      cssGradients('.singleLetter', colors);
      cssGradients('.letterRow', colors);
    });
  </script>
  <link rel="stylesheet" href="css/reset.css">

  <link rel="stylesheet" href="css/master.css">
  <style>

  /* Style Overrides N. Mutiti */
  #canvas {
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-flow: column nowrap;
    justify-content: space-between;
    height: 100vh;
    background-image: url('img/nontsikelelo-mutiti/background.png');
    /* background-size: contain; */
    filter: blur(1px);
    -webkit-animation: bgpos 64s linear 0s infinite; /* Safari 4+ */
    -moz-animation:    bgpos 64s linear 0s infinite; /* Fx 5+ */
    -o-animation:      bgpos 64s linear 0s infinite; /* Opera 12+ */
    animation:         bgpos 64s linear 0s infinite; /* IE 10+, Fx 29+ */
  }
  @-webkit-keyframes bgpos {
    0%   { background-position: 0% 0%; }
    25% { background-position: 0% 100%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 100% 0%; }
    100% { background-position: 0% 0%; }
  }
  .letterRow {
      display: flex;
      flex-flow: row nowrap;
      justify-content: space-between;
      flex: 1;
      min-width: 710px;
      mix-blend-mode: difference;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
  }

  .singleLetter {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: space-evenly;
      font-size: 22vh;
      overflow: hidden;
  }
  .singleLetter p {
    font-family: Arial;
    text-transform: uppercase;
  }
  .letterRow:hover{
    flex: 1 1 200px !important;
    cursor: pointer;
  }
  .singleLetter:hover{
    flex: 1 1 400px !important;
  }

  .singleLetter--black,
  .singleLetter--white:hover {
    background-color: white;
    color: black;
  }
  .singleLetter--white,
  .singleLetter--black:hover {
    background-color: black;
    color: white;
  }
  p {
    margin-block-start: 0px;
    margin-block-end: 0px;
    line-height: 1;
  }
  .singleLetter,
  .itemWrapper {
    transition: all 8s linear;
  }

  </style>
