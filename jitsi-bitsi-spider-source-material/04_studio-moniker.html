  <script>
    // Arrays for Moniker
class LetterMover {
  constructor() {
    this.MOVE_INTERVAL = 1500;
    this.CANVAS_UPDATE_INTERVAL = 4000;
    this.MAX_LETTER_COUNT = 9;
    this.fewColors = ['red', 'blue', 'green', 'black', 'white'];
    this.letterCount = 1;
    this.letterID = `#letter-0${this.letterCount}`;
  }

  moveHandler(e) {
    const { pageX: x, pageY: y } = e;
    const letter = document.querySelector(this.letterID);
    if (letter) {
      letter.style.cssText = `top: ${y}px; left: ${x}px; opacity: 1`;
      changeFontColorCss(this.letterID, this.fewColors);
    }
  }

  updateLetterCount() {
    document.removeEventListener('mousemove', this.moveHandler.bind(this));
    this.letterCount = this.letterCount < this.MAX_LETTER_COUNT ? this.letterCount + 1 : 0;
    this.letterID = `#letter-0${this.letterCount}`;
    setTimeout(() => document.addEventListener('mousemove', this.moveHandler.bind(this)), 200);
  }

  updateCanvas() {
    const canvas = document.querySelector('#canvas');
    if (canvas) {
      cssIDGradient('.canvas', this.fewColors);
    } else {
      console.error('No element with the class "canvas" found');
    }
  }

  initialize() {
    this.updateCanvas.bind(this)
    document.querySelectorAll(".letter").forEach(element => element.style.opacity = 0);
    document.addEventListener('mousemove', this.moveHandler.bind(this));
    setInterval(this.updateLetterCount.bind(this), this.MOVE_INTERVAL);
    setInterval(this.updateCanvas.bind(this), this.CANVAS_UPDATE_INTERVAL);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const letterMover = new LetterMover();
  letterMover.initialize();
});
  </script>
